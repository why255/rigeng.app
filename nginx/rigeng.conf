# 日耕（RiGeng）Nginx 配置 — UA 双站点分流
# PC 端 → dist/pc/，移动端 H5 → dist/mobile/
# 用 map 定义变量（优先于 set+if，与 root 指令兼容）

map $http_user_agent $device_type {
    default    "pc";
    "~*Mobile|Android|iPhone|iPad|iPod|BlackBerry|webOS" "mobile";
}

map $http_user_agent $html_root {
    default    "/usr/share/nginx/html/pc";
    "~*Mobile|Android|iPhone|iPad|iPod|BlackBerry|webOS" "/usr/share/nginx/html/mobile";
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name rigeng365.com localhost;

    # Gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 256;

    # API 代理 → FastAPI 后端
    location /api/ {
        client_max_body_size 10M;   # 语音识别Base64音频可达数MB（30s≈1.3MB）
        proxy_read_timeout 120s;    # 通义听悟ASR轮询最长30s+降级备用时间
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Device-Type $device_type;
    }

    # 健康检查
    location /health {
        proxy_pass http://backend;
    }

    # HTML 禁止缓存，确保登录页/SPA入口即时更新
    location ~* \.html$ {
        root $html_root;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Device-Type $device_type;
    }

    location / {
        root $html_root;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header X-Device-Type $device_type;
    }
}
