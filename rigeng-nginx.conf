# 日耕（RiGeng）Nginx 配置 — UA 双站点分流
# PC 端 → dist/pc/，移动端 H5 → dist/mobile/

map $http_user_agent $device_type {
    default    "pc";
    "~*Mobile|Android|iPhone|iPad|iPod|BlackBerry|webOS" "mobile";
}

map $http_user_agent $html_root {
    default    "/usr/share/nginx/html/pc";
    "~*Mobile|Android|iPhone|iPad|iPod|BlackBerry|webOS" "/usr/share/nginx/html/mobile";
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name rigeng365.com localhost;

    # Gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 256;

    # APK 下载
    location ~* \.apk$ {
        root /usr/share/nginx/html/mobile;
        add_header Content-Type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment; filename=日耕-v0.1.0-debug.apk";
        add_header Cache-Control "no-cache";
    }

    # API 代理 → FastAPI 后端
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Device-Type $device_type;
    }

    # 健康检查
    location /health {
        proxy_pass http://backend;
    }

    # HTML 禁止缓存
    location ~* \.html$ {
        root $html_root;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Device-Type $device_type;
    }

    location / {
        root $html_root;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header X-Device-Type $device_type;
    }
}
