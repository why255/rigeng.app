<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2C1810" />
<title>日耕（RiGeng）— 日耕朝夕，耕愈工作，耕暖生活</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:"PingFang SC","Microsoft YaHei","微软雅黑",sans-serif;background:#FDF8F3;color:#2D1810;-webkit-font-smoothing:antialiased}

/* ── 预加载层（#root 外面）── */
#rg-preload{position:fixed;inset:0;z-index:1000;display:flex;background:#FDF8F3}
/* 左侧品牌区 */
#rg-preload .rg-pl-brand{display:none;flex:1;background:linear-gradient(160deg,#6B3410,#8B4513,#A0522D);color:#fff;flex-direction:column;justify-content:center;align-items:center;padding:40px;position:relative;overflow:hidden}
#rg-preload .rg-pl-brand::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
#rg-preload .rg-pl-logo{width:100px;height:100px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:52px;margin-bottom:24px;position:relative;z-index:1;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2)}
#rg-preload .rg-pl-name{font-size:24px;font-weight:300;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:16px;position:relative;z-index:1}
#rg-preload .rg-pl-slogan{font-size:16px;font-weight:400;color:rgba(255,255,255,.72);margin-bottom:16px;position:relative;z-index:1}
#rg-preload .rg-pl-concept{font-size:26px;font-weight:700;color:#FFFFFF;position:relative;z-index:1}

/* 右侧表单区 */
#rg-preload .rg-pl-form-panel{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px}
#rg-preload .rg-pl-card{width:100%;max-width:400px}
/* 移动端品牌标识 */
#rg-preload .rg-pl-mb{text-align:center;margin-bottom:32px}
#rg-preload .rg-pl-mb-logo{width:64px;height:64px;background:#8B4513;color:#fff;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:12px}
#rg-preload .rg-pl-mb h1{font-size:22px;font-weight:700;color:#2D1810;margin-bottom:4px}
#rg-preload .rg-pl-mb p{font-size:14px;color:#8D6E63;font-style:italic}
#rg-preload .rg-pl-title{font-size:22px;font-weight:700;color:#2D1810;text-align:center;margin-bottom:8px}
#rg-preload .rg-pl-sub{font-size:14px;color:#8D6E63;text-align:center;margin-bottom:24px}
#rg-preload .rg-pl-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
#rg-preload .rg-pl-field label{font-size:14px;font-weight:500;color:#5D4037}
#rg-preload .rg-pl-field input{height:48px;padding:0 16px;border:1.5px solid #E0D5C5;border-radius:8px;font-size:15px;color:#2D1810;background:#FFF;outline:none;width:100%}
#rg-preload .rg-pl-field input:focus{border-color:#8B4513;box-shadow:0 0 0 3px rgba(139,69,19,.12)}
#rg-preload .rg-pl-field input::placeholder{color:#BBB}
#rg-preload .rg-pl-err{font-size:14px;color:#F44336;text-align:center;min-height:20px;line-height:20px;margin-bottom:8px}
#rg-preload .rg-pl-btn{width:100%;height:48px;border:none;border-radius:8px;background:#8B4513;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
#rg-preload .rg-pl-btn:hover{background:#A0522D}
#rg-preload .rg-pl-btn:disabled{opacity:.6;cursor:not-allowed}
#rg-preload .rg-pl-link{text-align:center;margin-top:16px;font-size:14px;color:#8D6E63}
#rg-preload .rg-pl-link a{color:#8B4513;font-weight:600;text-decoration:none;margin-left:4px;cursor:pointer}
#rg-preload .rg-pl-link a:hover{text-decoration:underline}
#rg-preload .rg-pl-footer{text-align:center;margin-top:16px;font-size:12px;color:#8D6E63;line-height:1.6}

@media(min-width:768px){
  #rg-preload .rg-pl-brand{display:flex}
  #rg-preload .rg-pl-mb{display:none}
  #rg-preload .rg-pl-form-panel{padding:40px}
}
</style>
</head>
<body>

<!-- ── 预加载层：#root 外面，React 挂载后自动隐藏 ── -->
<div id="rg-preload">
  <!-- 左侧品牌区 -->
  <div class="rg-pl-brand">
    <div class="rg-pl-logo">耕</div>
    <div class="rg-pl-name">日耕</div>
    <div class="rg-pl-slogan">日耕朝夕，耕愈工作，耕暖生活</div>
    <div class="rg-pl-concept">— 为不愿止步的高知职场人打造</div>
  </div>

  <!-- 右侧表单区 -->
  <div class="rg-pl-form-panel">
    <div class="rg-pl-card">
      <!-- 移动端品牌标识 -->
      <div class="rg-pl-mb">
        <div class="rg-pl-mb-logo">耕</div>
        <h1>日耕</h1>
        <p>日耕朝夕，耕愈工作，耕暖生活</p>
      </div>

      <h2 class="rg-pl-title">欢迎回来</h2>
      <p class="rg-pl-sub">登录你的日耕账户，继续精进之旅</p>

      <form id="rg-pl-form" onsubmit="return handlePreloadLogin(event)">
        <div class="rg-pl-err" id="rg-pl-err"> </div>
        <div class="rg-pl-field">
          <label>手机号</label>
          <input id="rg-pl-phone" type="tel" maxlength="11" placeholder="请输入手机号" />
        </div>
        <div class="rg-pl-field">
          <label>密码</label>
          <input id="rg-pl-pwd" type="password" placeholder="请输入密码（至少6位）" />
        </div>
        <button class="rg-pl-btn" id="rg-pl-submit" type="submit">登 录</button>
      </form>

      <div class="rg-pl-link">
        <span>还没有账号？</span>
        <a href="/register">立即注册</a>
      </div>
      <div class="rg-pl-footer">
        <p>注册即表示同意服务条款 · 7天全功能免费试用</p>
      </div>
    </div>
  </div>
</div>

<!-- React 挂载点 -->
<div id="root"></div>

<script>
// ── 预加载层登录逻辑 ──
function handlePreloadLogin(e) {
  e.preventDefault();
  var phone = document.getElementById('rg-pl-phone').value.trim();
  var pwd = document.getElementById('rg-pl-pwd').value.trim();
  var err = document.getElementById('rg-pl-err');
  var btn = document.getElementById('rg-pl-submit');
  if (!/^1[3-9]\d{9}$/.test(phone)) { err.textContent = '请输入正确的手机号'; return false; }
  if (pwd.length < 6) { err.textContent = '密码至少6位'; return false; }
  err.textContent = ' ';
  btn.disabled = true; btn.textContent = '登录中…';
  fetch('/api/v1/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone: phone, password: pwd })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.code !== 0) { err.textContent = d.message || '登录失败'; btn.disabled = false; btn.textContent = '登 录'; return; }
      try { localStorage.setItem('rg_token', d.data.token); localStorage.setItem('rg_user', JSON.stringify(d.data.user)); } catch(_) {}
      window.location.href = '/m/morning-plan';
    })
    .catch(function() { err.textContent = '网络错误，请稍后重试'; btn.disabled = false; btn.textContent = '登 录'; });
  return false;
}

// ── React 挂载后隐藏预加载层 ──
new MutationObserver(function() {
  var root = document.getElementById('root');
  if (root && root.innerHTML.trim()) {
    var el = document.getElementById('rg-preload');
    if (el) { el.style.display = 'none'; }
  }
}).observe(document.getElementById('root'), { childList: true, subtree: true });
</script>

<script type="module" src="/src/main.tsx"></script>
</body>
</html>
