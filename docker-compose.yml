# 日耕（RiGeng）全栈部署 — 后端 + Nginx（双站点分流）
version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - RIGENG_ENV=prod
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATABASE_URL=postgresql+psycopg2://rigeng:rigeng@db:5432/rigeng
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rigeng
      POSTGRES_PASSWORD: rigeng
      POSTGRES_DB: rigeng
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rigeng"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/rigeng.conf:/etc/nginx/conf.d/default.conf:ro
      - ./pc/dist/pc:/usr/share/nginx/html/pc:ro
      - ./mobile/dist/mobile:/usr/share/nginx/html/mobile:ro
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
