<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#2C1810" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>日耕（RiGeng）— 日耕朝夕，耕愈工作，耕暖生活</title>
<style>
:root{--p:#8B4513;--ph:#A0522D;--bg:#FDF8F3;--w:#FFF;--t:#2D1810;--t2:#5D4037;--tm:#8D6E63;--pl:#BBB;--br:#E0D5C5;--er:#F44336;--erb:#FFEBEE;--ok:#4CAF50;--okb:#E8F5E9}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei","微软雅黑","Noto Sans SC",sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased}
.rg-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.rg-card{width:100%;max-width:380px;background:var(--w);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:32px}
.rg-brand{text-align:center;margin-bottom:32px}
.rg-brand h1{font-size:26px;font-weight:800;color:var(--t);margin-bottom:8px}
.rg-brand p{font-size:14px;color:var(--tm)}
.rg-form{display:flex;flex-direction:column;gap:16px}
.rg-msg{padding:8px 12px;border-radius:4px;font-size:14px}
.rg-msg--e{background:var(--erb);color:var(--er)}
.rg-msg--s{background:var(--okb);color:var(--ok)}
.rg-field{display:flex;flex-direction:column;gap:4px}
.rg-field label{font-size:14px;color:var(--tm)}
.rg-field input{height:44px;padding:0 16px;border:1px solid var(--br);border-radius:8px;font-size:16px;color:var(--t);background:var(--w);outline:none;transition:border-color .2s}
.rg-field input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(139,69,19,.12)}
.rg-field input::placeholder{color:var(--pl)}
.rg-btn{height:44px;background:var(--p);color:var(--w);font-size:16px;font-weight:600;border:none;border-radius:8px;cursor:pointer;margin-top:8px;transition:background .2s}
.rg-btn:hover{background:var(--ph)}
.rg-btn:disabled{opacity:.6;cursor:not-allowed}
.rg-btn-o{background:var(--w);color:var(--p);border:1px solid var(--p)}
.rg-btn-o:hover{background:var(--p);color:var(--w)}
.rg-row{display:flex;gap:12px}
.rg-row input{flex:1}
.rg-row .rg-btn{flex-shrink:0;height:44px;padding:0 16px;font-size:14px;margin-top:0}
.rg-toggle{margin-top:24px;text-align:center;font-size:14px}
.rg-toggle s{color:var(--tm)}
.rg-toggle a{color:var(--p);font-weight:600;cursor:pointer;text-decoration:none;margin-left:4px}
.rg-toggle a:hover{text-decoration:underline}
.rg-footer{margin-top:24px;text-align:center;font-size:12px;color:var(--tm);line-height:1.6}
.h{display:none}
.rg-load{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:var(--tm);font-size:14px;gap:12px}
.rg-load span:first-child{font-size:32px}
</style>
</head>
<body>
<div id="root">
  <!-- 已登录 -->
  <div id="rg-load" class="h"><div class="rg-load"><span>⏳</span><span>日耕加载中...</span></div></div>
  <!-- 登录/注册 -->
  <div id="rg-forms"><div class="rg-page"><div class="rg-card">
    <div class="rg-brand"><h1>日耕</h1><p>日耕朝夕，耕愈工作，耕暖生活</p></div>
    <form id="fm-login" class="rg-form" onsubmit="return H('login',event)">
      <div id="er-login"></div>
      <div class="rg-field"><label>手机号</label><input id="lp" type="text" placeholder="请输入手机号" /></div>
      <div class="rg-field"><label>密码</label><input id="lw" type="password" placeholder="请输入密码" /></div>
      <button class="rg-btn" id="lb" type="submit">登 录</button>
    </form>
    <form id="fm-reg" class="rg-form h" onsubmit="return H('reg',event)">
      <div id="er-reg"></div>
      <div class="rg-field"><label>手机号</label><input id="rp" type="text" placeholder="请输入手机号" /></div>
      <div class="rg-field"><label>验证码</label><div class="rg-row"><input id="rc" type="text" placeholder="请输入验证码" maxlength="6" /><button class="rg-btn rg-btn-o" type="button" id="rb" onclick="G()">获取验证码</button></div></div>
      <div class="rg-field"><label>密码</label><input id="rw" type="password" placeholder="请设置密码（至少6位）" /></div>
      <div class="rg-field"><label>确认密码</label><input id="rw2" type="password" placeholder="请再次输入密码" /></div>
      <button class="rg-btn" id="rbtn" type="submit">注 册</button>
    </form>
    <div class="rg-toggle" id="tg-login"><s>还没有账号？</s><a onclick="S('reg')">立即注册</a></div>
    <div class="rg-toggle h" id="tg-reg"><s>已有账号？</s><a onclick="S('login')">去登录</a></div>
    <div class="rg-footer"><p>注册即表示同意服务条款</p><p>7天全功能免费试用</p></div>
  </div></div></div>
</div>
<script>
var _code='',_cd=0,_tmr=null;
(function(){
  if(localStorage.getItem('rg_token')){
    document.getElementById('rg-forms').classList.add('h');
    document.getElementById('rg-load').classList.remove('h');
  }
})();
function M(id,msg,t){
  var e=document.getElementById(id);
  e.innerHTML='<div class="rg-msg rg-msg--'+t+'">'+msg+'</div>';
}
function C(id){document.getElementById(id).innerHTML='';}
function S(t){
  var l=document.getElementById('fm-login'),r=document.getElementById('fm-reg');
  var tl=document.getElementById('tg-login'),tr=document.getElementById('tg-reg');
  if(t==='reg'){l.classList.add('h');r.classList.remove('h');tl.classList.add('h');tr.classList.remove('h');}
  else{r.classList.add('h');l.classList.remove('h');tr.classList.add('h');tl.classList.remove('h');}
  C('er-login');C('er-reg');
}
function A(path,body){
  return fetch('/api/v1'+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  .then(function(r){return r.json().then(function(d){if(d.code!==0)throw new Error(d.message||'请求失败');return d.data;})});
}
function H(t,e){
  e.preventDefault();
  if(t==='login'){
    C('er-login');
    var p=document.getElementById('lp').value.trim(),w=document.getElementById('lw').value.trim();
    if(!p||!w){M('er-login','请填写手机号和密码','e');return!1;}
    var b=document.getElementById('lb');b.disabled=!0;b.textContent='登录中...';
    A('/auth/login',{phone:p,password:w}).then(function(d){
      localStorage.setItem('rg_token',d.token);
      localStorage.setItem('rg_user',JSON.stringify(d.user));
      window.location.href='/m/morning-plan';
    }).catch(function(e){M('er-login',e.message,'e');b.disabled=!1;b.textContent='登 录';});
  }else{
    C('er-reg');
    var p=document.getElementById('rp').value.trim(),c=document.getElementById('rc').value.trim();
    var w=document.getElementById('rw').value.trim(),w2=document.getElementById('rw2').value.trim();
    if(!p){M('er-reg','请填写手机号','e');return!1;}
    if(!_code){M('er-reg','请先获取验证码','e');return!1;}
    if(c!==_code){M('er-reg','验证码错误','e');return!1;}
    if(!w){M('er-reg','请填写密码','e');return!1;}
    if(w.length<6){M('er-reg','密码至少6位','e');return!1;}
    if(w!==w2){M('er-reg','两次密码输入不一致','e');return!1;}
    var b=document.getElementById('rbtn');b.disabled=!0;b.textContent='注册中...';
    A('/auth/register',{phone:p,password:w,nickname:p}).then(function(){
      M('er-reg','注册成功！即将跳转登录页...','s');
      setTimeout(function(){S('login');},1000);
    }).catch(function(e){M('er-reg',e.message,'e');b.disabled=!1;b.textContent='注 册';});
  }
  return!1;
}
function G(){
  if(_cd>0)return;
  var p=document.getElementById('rp').value.trim();
  if(!p){M('er-reg','请先输入手机号','e');return;}
  C('er-reg');
  _code=String(Math.floor(100000+Math.random()*900000));
  console.log('[日耕] 验证码：'+_code+'（有效期60秒）');
  _cd=60;
  var b=document.getElementById('rb');b.textContent=_cd+'s';b.disabled=!0;
  _tmr=setInterval(function(){_cd--;if(_cd<=0){clearInterval(_tmr);b.textContent='获取验证码';b.disabled=!1;}else b.textContent=_cd+'s';},1000);
}
</script>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
