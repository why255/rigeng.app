# 日耕（RiGeng）Nginx 配置 — UA 双站点分流
# PC 端 → dist/pc/，移动端 H5 → dist/mobile/

map $http_user_agent $device_type {
    default    "pc";
    "~*Mobile|Android|iPhone|iPad|iPod|BlackBerry|webOS" "mobile";
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name rigeng.app localhost;

    # Gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 256;

    # API 代理 → FastAPI 后端
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Device-Type $device_type;
    }

    # 健康检查
    location /health {
        proxy_pass http://backend;
    }

    # API 文档（Swagger UI / ReDoc）
    location /docs {
        proxy_pass http://backend;
    }
    location /redoc {
        proxy_pass http://backend;
    }
    location /openapi.json {
        proxy_pass http://backend;
    }

    # PC 静态资源（默认）
    set $root_path /usr/share/nginx/html/pc;
    if ($device_type = "mobile") {
        set $root_path /usr/share/nginx/html/mobile;
    }

    location / {
        root $root_path;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 注入设备类型 header 供前端 JS 读取
        add_header X-Device-Type $device_type;
    }
}
