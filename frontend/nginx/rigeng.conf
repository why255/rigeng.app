# 日耕（RiGeng）Nginx 配置 — UA 双站点分流 + CSP安全 + Gzip加速
# PC 端 → dist/pc/，移动端 H5 → dist/mobile/

map $http_user_agent $device_type {
    default    "pc";
    "~*Mobile|Android|iPhone|iPad|iPod|BlackBerry|webOS" "mobile";
}

upstream backend {
    server backend:8000;
}

server {
    listen 80 default_server;
    server_name _ rigeng.app localhost 127.0.0.1 47.103.197.189;

    # ── Gzip 压缩（加速JS/CSS/HTML加载）──
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        text/html
        text/plain
        text/xml
        application/xml
        application/font-woff
        application/font-woff2;

    # ── Google 字体请求拦截（所有路径含 fonts.googleapis / fonts.gstatic 的一律空返回）──
    location ~* (fonts\.googleapis\.|fonts\.gstatic\.) {
        return 200 "";
    }

    # ── 静态资源强缓存（JS/CSS文件名含hash，可长期缓存）──
    location /assets/ {
        root /usr/share/nginx/html/pc;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Device-Type $device_type;
        add_header Content-Security-Policy "font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://api.iconify.design https://api.simplesvg.com https://api.unisvg.com https://api.dicebear.com; img-src 'self' data: https:;" always;
    }

    # API 代理 → FastAPI 后端
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Device-Type $device_type;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # 健康检查
    location /health {
        proxy_pass http://backend;
    }

    # API 文档（Swagger UI / ReDoc）
    location /docs {
        proxy_pass http://backend;
    }
    location /redoc {
        proxy_pass http://backend;
    }
    location /openapi.json {
        proxy_pass http://backend;
    }

    # PC 静态资源（默认）
    set $root_path /usr/share/nginx/html/pc;
    if ($device_type = "mobile") {
        set $root_path /usr/share/nginx/html/mobile;
    }

    location / {
        root $root_path;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 注入设备类型 header 供前端 JS 读取
        add_header X-Device-Type $device_type;

        # 安全策略：font-src锁定本域(CSP二级防御)；connect-src放行全部图标API
        add_header Content-Security-Policy "font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://api.iconify.design https://api.simplesvg.com https://api.unisvg.com https://api.dicebear.com; img-src 'self' data: https:;" always;

        # 禁止MIME类型嗅探
        add_header X-Content-Type-Options "nosniff" always;
    }
}
