<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2C1810" />
    <title>日耕（RiGeng）— 日耕朝夕，耕愈工作，耕暖生活</title>
    <!-- 字体：仅用系统字体栈，不引用任何外部CDN，避免国内GFW白屏 -->
    <style>
      @font-face { font-family: 'Noto Sans SC'; font-style: normal; font-weight: 400; font-display: swap; src: local('Noto Sans SC'), local('PingFang SC'), local('Microsoft YaHei'), local('微软雅黑'); }
      @font-face { font-family: 'Noto Sans SC'; font-style: normal; font-weight: 500; font-display: swap; src: local('Noto Sans SC'), local('PingFang SC'), local('Microsoft YaHei'), local('微软雅黑'); }
      @font-face { font-family: 'Noto Sans SC'; font-style: normal; font-weight: 700; font-display: swap; src: local('Noto Sans SC'), local('PingFang SC'), local('Microsoft YaHei'), local('微软雅黑'); }
      @font-face { font-family: 'ZCOOL XiaoWei'; font-style: normal; font-weight: 400; font-display: swap; src: local('ZCOOL XiaoWei'), local('STKaiti'), local('KaiTi'), local('楷体'); }
    </style>
    <!-- 图标CDN预连接：加速iconify等运行时API -->
    <link rel="preconnect" href="https://api.iconify.design" />
    <link rel="preconnect" href="https://api.simplesvg.com" />
    <link rel="dns-prefetch" href="https://api.iconify.design" />
    <link rel="dns-prefetch" href="https://api.simplesvg.com" />
    <link rel="dns-prefetch" href="https://api.unisvg.com" />
    <link rel="dns-prefetch" href="https://api.dicebear.com" />
  </head>
  <body>
    <div id="root">
      <!-- 加载占位：React挂载后自动替换 -->
      <div id="rg-loading" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:PingFang SC,Microsoft YaHei,sans-serif;color:#666;font-size:14px;flex-direction:column;gap:8px">
        <span style="font-size:32px">⏳</span>
        <span>日耕加载中...</span>
      </div>
    </div>
    <script>
      // 诊断：JS运行时错误 → 显示友好提示
      window.onerror=function(m,s,l,c,e){var r=document.getElementById('root');if(r&&r.children.length===1&&r.children[0].id==='rg-loading'){r.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;font-family:PingFang SC,Microsoft YaHei,sans-serif"><p style="color:#999">页面加载失败，请刷新重试</p><p style="font-size:12px;color:#bbb">'+((m||'').substring(0,80))+'</p></div>'}return!1};
      // 超时检测：15秒后 root 仍为占位 → 显示错误（521KB JS在慢网约需8-12秒）
      setTimeout(function(){var r=document.getElementById('root');if(r&&(r.children.length===0||(r.children.length===1&&r.children[0].id==='rg-loading'))){r.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:PingFang SC,Microsoft YaHei,sans-serif"><h2 style="color:#2C1810">日耕</h2><p style="color:#666">加载时间较长，请<button onclick="location.reload()" style="margin-left:8px;padding:4px 16px;background:#2C1810;color:#fff;border:none;border-radius:4px;cursor:pointer">刷新重试</button></p><p style="font-size:12px;color:#999">如持续超时，请检查网络或换用Chrome无痕模式</p></div>'}},15000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
